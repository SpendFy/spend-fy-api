services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=spendfy'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spendfy123}'
      - 'POSTGRES_USER=${POSTGRES_USER:-spendfy}'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
